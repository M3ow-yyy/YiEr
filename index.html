<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Melancholic Desktop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #5a5f66; /* Grey melancholic */
            background-image: linear-gradient(to bottom, #4a4f56, #2a2d34);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .app-icon {
            background: #2c2c2e;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.1);
        }
        /* Hide file inputs */
        input[type="file"] {
            display: none;
        }
        .text-shadow {
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #D98A94;
            border-radius: 3px;
        }
    </style>
</head>
<body class="fixed inset-0 flex flex-col px-4 pb-4 pt-[26px] text-white overflow-hidden overscroll-none w-full h-full">

    <!-- 4x4 Profile Widget -->
    <div class="relative w-full aspect-square rounded-[2.5rem] overflow-hidden shadow-lg shrink-0 mb-6 border border-white/10 mx-auto max-w-sm">
        <!-- Top Half -->
        <div class="absolute top-0 left-0 w-full h-[60%] group cursor-pointer bg-[#3a3d42]" onclick="document.getElementById('top-upload').click()">
            <img id="top-img" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+ip1sAAAAASUVORK5CYII=" class="w-full h-full object-cover transition duration-300 group-hover:brightness-75" alt="">
            <input type="file" id="top-upload" accept="image/*" onchange="previewImage(event, 'top-img')">
        </div>
        <!-- Bottom Half -->
        <div class="absolute bottom-0 left-0 w-full h-[55%] rounded-[2.5rem] overflow-hidden group cursor-pointer bg-[#3a3d42] z-0 shadow-[0_-5px_25px_rgba(0,0,0,0.3)]" onclick="document.getElementById('bottom-upload').click()">
            <img id="bottom-img" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+ip1sAAAAASUVORK5CYII=" class="w-full h-full object-cover transition duration-300 group-hover:brightness-75" alt="">
            <input type="file" id="bottom-upload" accept="image/*" onchange="previewImage(event, 'bottom-img')">
        </div>
        
        <!-- Avatar -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-20 h-20 rounded-full border-[3px] border-gray-200 overflow-hidden z-10 cursor-pointer group shadow-md bg-[#ffffff]" onclick="document.getElementById('avatar-upload').click()">
            <img id="avatar-img" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' fill='%23ffffff'/><path fill='%23cccccc' d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>" class="w-full h-full object-cover transition duration-300 group-hover:brightness-75" alt="">
            <input type="file" id="avatar-upload" accept="image/*" onchange="previewImage(event, 'avatar-img')">
        </div>

        <!-- Text Info -->
        <div class="absolute top-[64%] left-0 w-full flex flex-col items-center gap-0.5 z-10 text-shadow px-4">
            <div class="text-lg font-bold cursor-pointer hover:opacity-80 transition" onclick="openDialog('nickname', '昵称', '输入新昵称')">昵称</div>
            <div class="text-xs text-gray-200 cursor-pointer hover:opacity-80 transition" onclick="openDialog('userid', '@ID', '输入新ID')">@ID</div>
            <div class="text-lg mt-1 cursor-pointer hover:opacity-80 transition text-center line-clamp-2" onclick="openDialog('signature', '祝你早安午安晚安', '输入新签名')">祝你早安午安晚安</div>
            <div class="text-sm mt-1 flex items-center gap-1 cursor-pointer hover:opacity-80 transition text-gray-200" onclick="openDialog('location', 'London', '输入新位置')">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"></path></svg>
                <span id="location-text">London</span>
            </div>
        </div>
    </div>

    <!-- Middle Grid -->
    <div class="mt-auto mb-6 grid grid-cols-4 gap-4 px-2 mx-auto w-full max-w-sm shrink-0">
        <!-- Calendar Widget (2x2) -->
        <div class="col-span-2 row-span-2 bg-[#F9ECEC]/95 backdrop-blur-sm border border-white/20 rounded-[2rem] p-3.5 flex flex-col shadow-lg aspect-square w-full relative overflow-hidden">
            <div class="flex items-end justify-between mb-2 shrink-0">
                <div class="flex items-baseline gap-1.5 cursor-pointer w-fit hover:opacity-80 transition" onclick="openCalendar()">
                    <div class="text-4xl font-bold text-[#6D5A62] leading-none" id="cal-date"></div>
                    <div class="flex flex-col justify-end pb-0.5">
                        <div class="text-xs font-bold text-[#D98A94]" id="cal-month"></div>
                        <div class="text-[9px] text-[#A89297] uppercase tracking-wider font-medium" id="cal-day"></div>
                    </div>
                </div>
                <div class="text-[10px] text-[#D98A94] font-bold tracking-widest bg-[#D98A94]/10 px-2 py-1 rounded-full cursor-pointer hover:bg-[#D98A94]/20 transition" onclick="openScheduleEditorForToday()">+ 添加</div>
            </div>
            
            <div class="flex-1 w-full overflow-y-auto space-y-1.5 pr-1 custom-scrollbar" id="widget-schedule-list">
                <!-- Schedules injected via JS -->
            </div>
        </div>

        <!-- Apps (1x1 each) -->
        <!-- WeChat -->
        <div class="flex flex-col items-center justify-start gap-1">
            <div class="w-[4rem] h-[4rem] app-icon rounded-[1.2rem] flex items-center justify-center glass shadow-md">
                <svg class="w-8 h-8 text-gray-300" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8.5,13.5 C7.1,13.5 6,12.4 6,11 C6,9.6 7.1,8.5 8.5,8.5 C9.9,8.5 11,9.6 11,11 C11,12.4 9.9,13.5 8.5,13.5 Z M15.5,13.5 C14.1,13.5 13,12.4 13,11 C13,9.6 14.1,8.5 15.5,8.5 C16.9,8.5 18,9.6 18,11 C18,12.4 16.9,13.5 15.5,13.5 Z M12,3 C6.5,3 2,6.9 2,11.8 C2,14.6 3.5,17.1 5.9,18.7 C5.7,19.7 5.1,21.1 5.1,21.1 C5.1,21.1 6.8,20.5 8.3,19.7 C9.5,20.2 10.7,20.5 12,20.5 C17.5,20.5 22,16.6 22,11.8 C22,6.9 17.5,3 12,3 Z"/>
                </svg>
            </div>
            <span class="text-[12px] text-gray-200">微信</span>
        </div>
        <!-- Check Phone -->
        <div class="flex flex-col items-center justify-start gap-1">
            <div class="w-[4rem] h-[4rem] app-icon rounded-[1.2rem] flex items-center justify-center glass shadow-md">
                <svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
            </div>
            <span class="text-[12px] text-gray-200">查手机</span>
        </div>
        <!-- Community (X) -->
        <div class="flex flex-col items-center justify-start gap-1">
            <div class="w-[4rem] h-[4rem] app-icon rounded-[1.2rem] flex items-center justify-center glass shadow-md">
                <svg class="w-8 h-8 text-gray-300" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
            </div>
            <span class="text-[12px] text-gray-200">社区</span>
        </div>
        <!-- Diary -->
        <div class="flex flex-col items-center justify-start gap-1">
            <div class="w-[4rem] h-[4rem] app-icon rounded-[1.2rem] flex items-center justify-center glass shadow-md">
                <svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </div>
            <span class="text-[12px] text-gray-200">日记</span>
        </div>
    </div>

    <!-- Dock -->
    <div class="mb-4 mx-auto glass rounded-[2rem] p-4 flex gap-8 shadow-2xl border border-white/20 shrink-0">
        <!-- Messages -->
        <div class="w-[4rem] h-[4rem] app-icon rounded-[1.2rem] flex items-center justify-center glass shadow-md">
            <svg class="w-8 h-8 text-gray-300" fill="currentColor" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"></path></svg>
        </div>
        <!-- Phone -->
        <div class="w-[4rem] h-[4rem] app-icon rounded-[1.2rem] flex items-center justify-center glass shadow-md">
            <svg class="w-8 h-8 text-gray-300" fill="currentColor" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"></path></svg>
        </div>
        <!-- Settings -->
        <div class="w-[4rem] h-[4rem] app-icon rounded-[1.2rem] flex items-center justify-center glass shadow-md">
            <svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        </div>
    </div>

    <!-- Calendar App Overlay -->
    <div id="calendar-app" class="fixed inset-0 w-full h-full overscroll-none bg-[#f4f4f5] z-40 hidden flex-col transition-transform duration-300 translate-y-full text-gray-800">
        <div class="pt-[38px] pb-4 px-6 flex justify-between items-center bg-white shadow-sm shrink-0">
            <button onclick="closeCalendar()" class="text-blue-500 font-medium hover:opacity-80">返回</button>
            <h2 id="calendar-header" class="text-lg font-bold"></h2>
            <button class="text-blue-500 font-medium opacity-0 cursor-default">添加</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 max-w-sm mx-auto w-full">
            <div class="flex justify-between items-center mb-6 px-2 mt-4">
                <button onclick="changeMonth(-1)" class="p-2 bg-gray-200 rounded-full text-gray-600 hover:bg-gray-300 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <div class="text-sm text-gray-500 font-medium">点击日期添加日程</div>
                <button onclick="changeMonth(1)" class="p-2 bg-gray-200 rounded-full text-gray-600 hover:bg-gray-300 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
            <div class="grid grid-cols-7 gap-1 text-center text-[10px] text-gray-400 mb-2 font-bold tracking-wider">
                <div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-1 text-center">
                <!-- Days injected via JS -->
            </div>
        </div>
    </div>

    <!-- Day Schedule List Dialog -->
    <div id="day-list-overlay" class="fixed inset-0 w-full h-full bg-black/50 backdrop-blur-sm z-50 hidden flex flex-col justify-end opacity-0 transition-opacity duration-300">
        <div class="bg-[#f4f4f5] w-full max-w-md mx-auto rounded-t-[2rem] p-6 shadow-2xl transform translate-y-full transition-transform duration-300 h-[60vh] flex flex-col" id="day-list-box">
            <div class="flex justify-between items-center mb-4 shrink-0">
                <h3 id="day-list-title" class="text-gray-800 font-bold text-lg">行程</h3>
                <button onclick="closeDayList()" class="text-gray-400 hover:text-gray-800 transition p-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="day-list-content" class="flex-1 overflow-y-auto flex flex-col gap-3 mb-4">
                <!-- List items injected here -->
            </div>
            <button onclick="openScheduleEditor()" class="w-full bg-pink-400 text-white rounded-[1.5rem] py-3.5 font-bold hover:bg-pink-500 transition shadow-md shrink-0">添加行程</button>
        </div>
    </div>

    <!-- Schedule Editor Dialog -->
    <div id="schedule-edit-overlay" class="fixed inset-0 w-full h-full bg-black/50 backdrop-blur-sm z-[60] hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="bg-[#fff9f9] w-4/5 max-w-sm rounded-[2rem] p-6 shadow-2xl transform scale-95 transition-transform duration-300" id="schedule-edit-box">
            <h3 id="schedule-edit-title" class="text-gray-800 font-bold text-lg mb-4 text-center">编辑行程</h3>
            
            <div class="mb-4">
                <label class="block text-xs text-gray-500 mb-2 font-medium">选择或输入图标</label>
                <div class="flex gap-3 items-center mb-3">
                    <input type="text" id="custom-emoji-input" class="w-12 h-10 text-center text-xl bg-gray-100 rounded-[0.8rem] outline-none focus:ring-2 focus:ring-pink-300 shadow-inner" maxlength="2" value="📌" oninput="updateCustomEmoji(this.value)">
                    <span class="text-xs text-gray-400">← 可直接输入其他Emoji</span>
                </div>
                <div class="grid grid-cols-6 gap-2 text-xl" id="emoji-picker">
                    <!-- Emojis injected via JS -->
                </div>
            </div>

            <textarea id="schedule-input" class="w-full bg-gray-100 border-none rounded-[1.5rem] px-4 py-3 text-gray-800 focus:ring-2 focus:ring-pink-300 outline-none mb-6 text-center shadow-inner resize-none" rows="2" placeholder="行程内容"></textarea>
            
            <div class="flex justify-between gap-3">
                <button onclick="deleteSchedule()" id="btn-delete-schedule" class="flex-1 bg-red-100 text-red-500 rounded-full py-2.5 font-bold hover:bg-red-200 transition hidden">删除</button>
                <button onclick="closeScheduleEditor()" class="flex-1 bg-gray-200 text-gray-600 rounded-full py-2.5 font-bold hover:bg-gray-300 transition">取消</button>
                <button onclick="saveSchedule()" class="flex-1 bg-pink-400 text-white rounded-full py-2.5 font-bold hover:bg-pink-500 transition shadow-md">确定</button>
            </div>
        </div>
    </div>

    <!-- Custom Dialog -->
    <div id="dialog-overlay" class="fixed inset-0 w-full h-full bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="bg-[#fff9f9] w-4/5 max-w-sm rounded-[2rem] p-6 shadow-2xl transform scale-95 transition-transform duration-300" id="dialog-box">
            <h3 id="dialog-title" class="text-gray-800 font-bold text-lg mb-4 text-center">修改</h3>
            <textarea id="dialog-input" class="w-full bg-gray-100 border-none rounded-[1.5rem] px-4 py-3 text-gray-800 focus:ring-2 focus:ring-pink-300 outline-none mb-6 text-center shadow-inner resize-none" rows="3" placeholder="输入内容(多个日程请换行)"></textarea>
            <div class="flex justify-between gap-4">
                <button onclick="closeDialog()" class="flex-1 bg-gray-200 text-gray-600 rounded-full py-2.5 font-bold hover:bg-gray-300 transition">取消</button>
                <button onclick="saveDialog()" class="flex-1 bg-pink-400 text-white rounded-full py-2.5 font-bold hover:bg-pink-500 transition shadow-md">确定</button>
            </div>
        </div>
    </div>

    <script>
        // --- Schedule & Calendar Logic ---
        const months = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
        const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        
        // 数据结构兼容转换 (新版本支持单日多行程与Emoji)
        let rawSchedules = JSON.parse(localStorage.getItem('melancholic_schedules') || '{}');
        let schedules = {};
        for (let date in rawSchedules) {
            if (typeof rawSchedules[date] === 'string') {
                let lines = rawSchedules[date].split('\n').filter(l => l.trim() !== '');
                schedules[date] = lines.map((text, idx) => ({ id: Date.now() + idx, emoji: '📌', text: text }));
            } else {
                schedules[date] = rawSchedules[date];
            }
        }
        function saveSchedulesData() {
            localStorage.setItem('melancholic_schedules', JSON.stringify(schedules));
        }

        let currentCalDate = new Date();
        let selectedDateStr = null;
        let editingScheduleId = null;
        const EMOJI_LIST = ['📌', '🗓️', '✈️', '🚗', '🍔', '☕', '🏃‍♂️', '🎮', '🎂', '🏥', '💼', '💰'];
        let currentSelectedEmoji = '📌';

        function updateWidget() {
            const today = new Date();
            document.getElementById('cal-month').innerText = months[today.getMonth()];
            document.getElementById('cal-date').innerText = today.getDate();
            document.getElementById('cal-day').innerText = days[today.getDay()].substring(0, 3); // Shortened day

            const todayStr = `${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;
            
            const todaySchedules = schedules[todayStr] || [];
            const listDiv = document.getElementById('widget-schedule-list');
            listDiv.innerHTML = '';
            
            if (todaySchedules.length > 0) {
                todaySchedules.forEach(item => {
                    const isChecked = item.completed;
                    listDiv.innerHTML += `
                        <div class="flex items-center gap-2 bg-white/70 rounded-xl p-2 shadow-sm border border-white/50">
                            <button onclick="toggleComplete('${todayStr}', ${item.id})" class="shrink-0 w-3.5 h-3.5 rounded-[4px] border-2 flex items-center justify-center transition-colors ${isChecked ? 'bg-[#D98A94] border-[#D98A94]' : 'border-[#D98A94]/50 bg-transparent'}">
                                ${isChecked ? '<svg class="w-2.5 h-2.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>' : ''}
                            </button>
                            <div class="text-[11px] text-[#6D5A62] truncate flex-1 font-medium ${isChecked ? 'line-through opacity-50' : ''}">${item.emoji} ${item.text}</div>
                        </div>
                    `;
                });
            } else {
                listDiv.innerHTML = `<div class="text-[10px] text-[#A89297] flex items-center justify-center h-full w-full opacity-70 font-medium pb-4">今日暂无行程☕</div>`;
            }
        }

        function toggleComplete(dateStr, id) {
            if (schedules[dateStr]) {
                const item = schedules[dateStr].find(s => s.id === id);
                if (item) {
                    item.completed = !item.completed;
                    saveSchedulesData();
                    updateWidget();
                    if (!document.getElementById('day-list-overlay').classList.contains('hidden') && selectedDateStr === dateStr) {
                        renderDayList();
                    }
                }
            }
        }

        function openScheduleEditorForToday() {
            const today = new Date();
            selectedDateStr = `${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;
            openScheduleEditor();
        }
        updateWidget();

        function openCalendar() {
            currentCalDate = new Date();
            renderCalendar();
            const calApp = document.getElementById('calendar-app');
            calApp.classList.remove('hidden');
            // Force reflow
            void calApp.offsetWidth;
            calApp.classList.remove('translate-y-full');
        }

        function closeCalendar() {
            const calApp = document.getElementById('calendar-app');
            calApp.classList.add('translate-y-full');
            setTimeout(() => {
                calApp.classList.add('hidden');
            }, 300);
            updateWidget();
        }

        function changeMonth(dir) {
            currentCalDate.setMonth(currentCalDate.getMonth() + dir);
            renderCalendar();
        }

        function renderCalendar() {
            const year = currentCalDate.getFullYear();
            const month = currentCalDate.getMonth();
            document.getElementById('calendar-header').innerText = `${year}年 ${months[month]}`;
            
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;
            
            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div></div>`;
            }
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${month + 1}-${i}`;
                const isToday = (dateStr === todayStr);
                const dayEvents = schedules[dateStr] || [];
                const currentDayOfWeek = new Date(year, month, i).getDay();
                const isWeekend = currentDayOfWeek === 0 || currentDayOfWeek === 6;
                
                let classes = "aspect-square flex flex-col pt-1 pb-1 items-center rounded-sm text-sm relative cursor-pointer hover:opacity-80 transition";
                if (isToday) {
                    classes += " bg-[#cfb2b6] text-white font-bold shadow-sm";
                } else if (isWeekend) {
                    classes += " bg-[#e8eef5] text-[#837a73]";
                } else {
                    classes += " bg-[#f0f0f0] text-[#837a73]";
                }
                
                let eventDisplay = '';
                if (dayEvents.length > 0) {
                    let displayEmojis = dayEvents.slice(0, 4).map(e => e.emoji).join('');
                    eventDisplay = `<div class="mt-auto mb-auto text-[12px] leading-tight text-center flex flex-wrap justify-center px-0.5">${displayEmojis}</div>`;
                }
                
                grid.innerHTML += `<div class="${classes}" onclick="openDayList('${dateStr}')">
                    <span class="text-[10px] font-semibold self-end pr-1.5 opacity-70">${i}</span>
                    ${eventDisplay}
                </div>`;
            }
        }

        // --- Day List Overlay ---
        const dayListOverlay = document.getElementById('day-list-overlay');
        const dayListBox = document.getElementById('day-list-box');
        const dayListContent = document.getElementById('day-list-content');

        function openDayList(dateStr) {
            selectedDateStr = dateStr;
            document.getElementById('day-list-title').innerText = `${dateStr} 行程`;
            renderDayList();

            dayListOverlay.classList.remove('hidden');
            void dayListOverlay.offsetWidth; // reflow
            dayListOverlay.classList.remove('opacity-0');
            dayListBox.classList.remove('translate-y-full');
        }

        function closeDayList() {
            dayListOverlay.classList.add('opacity-0');
            dayListBox.classList.add('translate-y-full');
            setTimeout(() => {
                dayListOverlay.classList.add('hidden');
            }, 300);
            renderCalendar();
            updateWidget();
        }

        function renderDayList() {
            const dayEvents = schedules[selectedDateStr] || [];
            dayListContent.innerHTML = '';
            
            if (dayEvents.length === 0) {
                dayListContent.innerHTML = `<div class="text-center text-gray-400 text-sm mt-8">今日暂无行程</div>`;
                return;
            }

            dayEvents.forEach(item => {
                const isChecked = item.completed;
                dayListContent.innerHTML += `
                    <div class="bg-white rounded-[1.2rem] p-4 flex items-center gap-3 shadow-sm border border-gray-100">
                        <button onclick="toggleComplete('${selectedDateStr}', ${item.id})" class="shrink-0 w-6 h-6 rounded-md border-2 flex items-center justify-center transition-colors ${isChecked ? 'bg-pink-400 border-pink-400' : 'border-pink-300 bg-transparent'}">
                            ${isChecked ? '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}
                        </button>
                        <div class="text-2xl opacity-${isChecked ? '50' : '100'}">${item.emoji}</div>
                        <div class="flex-1 text-gray-700 font-medium truncate ${isChecked ? 'line-through opacity-50' : ''}">${item.text}</div>
                        <button onclick="openScheduleEditor(${item.id})" class="p-2 hover:bg-gray-100 rounded-full text-gray-400 transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        </button>
                    </div>
                `;
            });
        }

        // --- Schedule Editor ---
        const schedEditOverlay = document.getElementById('schedule-edit-overlay');
        const schedEditBox = document.getElementById('schedule-edit-box');
        const schedInput = document.getElementById('schedule-input');
        const emojiPicker = document.getElementById('emoji-picker');
        const btnDeleteSched = document.getElementById('btn-delete-schedule');

        function initEmojiPicker() {
            emojiPicker.innerHTML = EMOJI_LIST.map(e => `
                <div class="cursor-pointer hover:bg-gray-200 rounded-lg p-1 text-center transition select-none" onclick="selectEmoji('${e}', this)">${e}</div>
            `).join('');
        }
        initEmojiPicker();

        function selectEmoji(emoji, element, updateInput = true) {
            currentSelectedEmoji = emoji;
            if (updateInput) {
                document.getElementById('custom-emoji-input').value = emoji;
            }
            Array.from(emojiPicker.children).forEach(el => {
                el.classList.remove('bg-pink-100', 'ring-2', 'ring-pink-300');
            });
            if(element) {
                element.classList.add('bg-pink-100', 'ring-2', 'ring-pink-300');
            }
        }

        function updateCustomEmoji(val) {
            currentSelectedEmoji = val || '📌';
            Array.from(emojiPicker.children).forEach(el => {
                el.classList.remove('bg-pink-100', 'ring-2', 'ring-pink-300');
            });
            const index = EMOJI_LIST.indexOf(val);
            if (index !== -1) {
                emojiPicker.children[index].classList.add('bg-pink-100', 'ring-2', 'ring-pink-300');
            }
        }

        function openScheduleEditor(id = null) {
            editingScheduleId = id;
            document.getElementById('schedule-edit-title').innerText = id ? '编辑行程' : '添加行程';
            
            if (id) {
                const item = (schedules[selectedDateStr] || []).find(s => s.id === id);
                schedInput.value = item ? item.text : '';
                currentSelectedEmoji = item ? item.emoji : '📌';
                btnDeleteSched.classList.remove('hidden');
            } else {
                schedInput.value = '';
                currentSelectedEmoji = '📌';
                btnDeleteSched.classList.add('hidden');
            }

            document.getElementById('custom-emoji-input').value = currentSelectedEmoji;
            
            const emojiIndex = EMOJI_LIST.indexOf(currentSelectedEmoji);
            if (emojiIndex !== -1) {
                selectEmoji(currentSelectedEmoji, emojiPicker.children[emojiIndex], false);
            } else {
                selectEmoji(currentSelectedEmoji, null, false);
            }

            schedEditOverlay.classList.remove('hidden');
            void schedEditOverlay.offsetWidth;
            schedEditOverlay.classList.remove('opacity-0');
            schedEditBox.classList.remove('scale-95');
            schedEditBox.classList.add('scale-100');
            schedInput.focus();
        }

        function closeScheduleEditor() {
            schedEditOverlay.classList.add('opacity-0');
            schedEditBox.classList.remove('scale-100');
            schedEditBox.classList.add('scale-95');
            setTimeout(() => {
                schedEditOverlay.classList.add('hidden');
            }, 300);
        }

        function saveSchedule() {
            const text = schedInput.value.trim();
            if (!text) return closeScheduleEditor();
            
            currentSelectedEmoji = document.getElementById('custom-emoji-input').value.trim() || '📌';

            if (!schedules[selectedDateStr]) {
                schedules[selectedDateStr] = [];
            }

            if (editingScheduleId) {
                const idx = schedules[selectedDateStr].findIndex(s => s.id === editingScheduleId);
                if (idx > -1) {
                    const oldItem = schedules[selectedDateStr][idx];
                    schedules[selectedDateStr][idx] = { ...oldItem, emoji: currentSelectedEmoji, text };
                }
            } else {
                schedules[selectedDateStr].push({ id: Date.now(), emoji: currentSelectedEmoji, text, completed: false });
            }

            saveSchedulesData();
            closeScheduleEditor();
            renderDayList();
        }

        function deleteSchedule() {
            if (editingScheduleId && schedules[selectedDateStr]) {
                schedules[selectedDateStr] = schedules[selectedDateStr].filter(s => s.id !== editingScheduleId);
                if (schedules[selectedDateStr].length === 0) {
                    delete schedules[selectedDateStr];
                }
                saveSchedulesData();
            }
            closeScheduleEditor();
            renderDayList();
        }

        // Image Preview
        function previewImage(event, imgId) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById(imgId).src = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        }

        // Dialog Logic
        let currentEditingElement = null;
        const overlay = document.getElementById('dialog-overlay');
        const box = document.getElementById('dialog-box');
        const input = document.getElementById('dialog-input');
        const title = document.getElementById('dialog-title');

        function openDialog(elementId, defaultValue, titleText, overrideText = null) {
            // Keep reference to event target if available, or create virtual object for schedules
            currentEditingElement = (event && event.currentTarget) ? event.currentTarget : null;
            title.innerText = titleText;
            
            // Setup values based on type
            if (elementId === 'location') {
                input.value = document.getElementById('location-text').innerText;
            } else if (currentEditingElement) {
                input.value = currentEditingElement.innerText;
            }

            overlay.classList.remove('hidden');
            // Trigger reflow
            void overlay.offsetWidth;
            overlay.classList.remove('opacity-0');
            box.classList.remove('scale-95');
            box.classList.add('scale-100');
            input.focus();
        }

        function closeDialog() {
            overlay.classList.add('opacity-0');
            box.classList.remove('scale-100');
            box.classList.add('scale-95');
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 300);
        }

        function saveDialog() {
            if (currentEditingElement) {
                const val = input.value.trim();
                
                if (val !== "") {
                    // Update standard desktop text
                    const singleLineVal = val.replace(/\n/g, ' ');
                    if (currentEditingElement.querySelector && currentEditingElement.querySelector('#location-text')) {
                        document.getElementById('location-text').innerText = singleLineVal;
                    } else if (currentEditingElement.innerText !== undefined) {
                        currentEditingElement.innerText = singleLineVal;
                    }
                }
            }
            closeDialog();
        }
    </script>
</body>
</html>
